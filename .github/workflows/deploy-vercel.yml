name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Run smoke checks
        run: npm run test:smoke

      - name: Pull Vercel environment
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          deployment_url=$(npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Verify deployed health endpoint
        run: |
          curl --fail --silent --show-error "${{ steps.deploy.outputs.deployment_url }}/api/health"
