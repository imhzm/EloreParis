name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Run smoke checks
        run: npm run test:smoke

      - name: Verify production catalog and commerce fences
        run: npm run test:production-fence

      - name: Upload release evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: .artifacts/release-evidence.json
          if-no-files-found: ignore

      - name: Upload release package artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            .artifacts/release-package.json
            .artifacts/release-package.md
          if-no-files-found: ignore

      - name: Upload release history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-history
          path: |
            .artifacts/release-history.json
            .artifacts/release-history.md
          if-no-files-found: ignore

      - name: Upload release diff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-diff
          path: |
            .artifacts/release-diff.json
            .artifacts/release-diff.md
          if-no-files-found: ignore

      - name: Upload release handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-handoff
          path: |
            .artifacts/release-handoff.json
            .artifacts/release-handoff.md
          if-no-files-found: ignore

      - name: Upload release decision artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-decision
          path: |
            .artifacts/release-decision.json
            .artifacts/release-decision.md
          if-no-files-found: ignore

      - name: Upload release packet artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-packet
          path: |
            .artifacts/release-packet.json
            .artifacts/release-packet.md
          if-no-files-found: ignore
