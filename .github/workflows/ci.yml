name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Run smoke checks
        run: npm run test:smoke

      - name: Upload release evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: .artifacts/release-evidence.json
          if-no-files-found: ignore

      - name: Upload release package artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            .artifacts/release-package.json
            .artifacts/release-package.md
          if-no-files-found: ignore

      - name: Upload release history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-history
          path: |
            .artifacts/release-history.json
            .artifacts/release-history.md
          if-no-files-found: ignore
