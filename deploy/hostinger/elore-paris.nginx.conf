limit_req_zone $binary_remote_addr zone=elore_commerce:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=elore_tracking:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name elore-paris.com www.elore-paris.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://elore-paris.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.elore-paris.com;

    ssl_certificate /etc/letsencrypt/live/elore-paris.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elore-paris.com/privkey.pem;

    return 301 https://elore-paris.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name elore-paris.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/elore-paris.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elore-paris.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:EloreTLS:10m;

    client_max_body_size 1m;

    location = /api/orders {
        limit_req zone=elore_commerce burst=5 nodelay;
        proxy_pass http://127.0.0.1:3056;
        include proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/orders/ {
        limit_req zone=elore_tracking burst=5 nodelay;
        proxy_pass http://127.0.0.1:3056;
        include proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:3056;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
