# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

services:
  - type: web
    runtime: node
    name: ksa-cozmateks
    plan: starter
    region: frankfurt
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    maxShutdownDelaySeconds: 120
    disk:
      name: authority-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: AUTHORITY_DB_PATH
        value: /var/data/authority.sqlite
      - key: RELEASE_EVIDENCE_PATH
        value: /var/data/release-evidence.json
      - key: ENFORCE_OPS_ACCESS
        value: "true"
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: ORDER_AUTHORITY_SECRET
        generateValue: true
      - key: OPS_ACCESS_SIGNING_SECRET
        generateValue: true
      - key: OPS_AUTH_USERS_JSON
        sync: false
